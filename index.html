<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя библиотека игр</title>
    <style>
        * {
            box-sizing: border-box;
        }
    
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(90deg, #07111f 0%, #031321 100%);
            color: #fff;
        }
    
        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 24px;
        }
    
        .header-title {
            margin: 0 0 10px 0;
            font-size: 28px;
        }
    
        .hint {
            margin: 0 0 20px 0;
            color: #9fb4c7;
            font-size: 14px;
        }
    
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 18px;
        }
    
        .topbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
    
        .search-input {
            min-width: 280px;
            flex: 1 1 280px;
            max-width: 420px;
            border: none;
            outline: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            background: #132437;
            color: #fff;
        }
    
        .search-input::placeholder {
            color: #8da6bd;
        }
    
        .subbar {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }
    
        .subbar.visible {
            display: flex;
        }
    
        .filter-btn,
        .subfilter-btn {
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 16px;
            cursor: pointer;
            background: #1b2c40;
            color: #fff;
            transition: 0.2s;
        }
    
        .filter-btn:hover,
        .subfilter-btn:hover {
            background: #29425d;
        }
    
        .filter-btn.active,
        .subfilter-btn.active {
            background: #66c0f4;
            color: #0b141c;
            font-weight: bold;
        }
    
        .games-grid {
            display: grid;

            grid-template-columns: repeat(
                auto-fill,
                minmax(420px, 1fr)
            );

            gap: 18px;
        }
    
        .game-card {
            position: relative;
        
            text-decoration: none;
        
            color: #fff;
        
            display: block;
        
            transition: transform 0.18s ease;
        
            z-index: 1;
        }
        
        .game-card:hover .game-cover {
            transform: scale(1.03);
        }
    
        .game-card:hover {
            transform: translateY(-4px) scale(1.01);
            z-index: 999;
        }
    
        .game-cover-wrap {
            position: relative;

            background: #1a2b3f;
        
            border-radius: 14px;
        
            overflow: hidden;
        
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
        
            aspect-ratio: 460 / 215;
        }
    
        .game-cover {
            width: 100%;
            height: 100%;
        
            object-fit: cover;
        
            display: block;
        
            transition: transform 0.25s ease;
        }
    
        .game-title {
            position: absolute;

            left: 0;
            right: 0;
            bottom: 0;

            display: flex;
            align-items: center;
            gap: 10px;
        
            padding: 18px 14px 12px;
        
            font-size: 18px;
        
            font-weight: bold;
        
            line-height: 1.2;
        
            color: #fff;
        
            background: linear-gradient(
                to top,
                rgba(0,0,0,0.88),
                rgba(0,0,0,0.0)
            );
        
            z-index: 3;
        }
        
        .copy-btn {
            border: none;
        
            background: rgba(255,255,255,0.12);
        
            color: #fff;
        
            border-radius: 8px;
        
            width: 30px;
            height: 30px;
        
            cursor: pointer;
        
            flex-shrink: 0;
        
            transition: 0.2s ease;
        
            font-size: 15px;
        }
        
        .copy-btn:hover {
            background: rgba(102, 192, 244, 0.9);
        
            color: #0b141c;
        }
        
        .game-title-text {
            overflow: hidden;
        
            text-overflow: ellipsis;
        
            white-space: nowrap;
        }
    
        .game-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 2;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }
    
        .badge-platform {
            top: auto;
            bottom: 55px;
            left: 8px;
        }
    
        .badge-stream {
            background: rgba(102, 192, 244, 0.92);
            color: #0b141c;
        }
    
        .badge-offstream {
            background: rgba(240, 240, 240, 0.92);
            color: #111;
        }
    
        .badge-platform-steam {
            background: rgba(23, 26, 33, 0.9);
            color: #66c0f4;
            border: 1px solid rgba(102, 192, 244, 0.35);
        }
    
        .badge-platform-gog {
            background: rgba(134, 66, 255, 0.9);
            color: #fff;
        }
    
        .hidden {
            display: none !important;
        }
    
        /* TOOLTIP */
    
        .game-tooltip {
            position: absolute;
    
            left: 50%;
            top: 10px;
    
            transform: translateX(-50%);
    
            width: 320px;
    
            background: rgba(15, 20, 28, 0.98);
    
            border: 1px solid rgba(102, 192, 244, 0.3);
    
            border-radius: 12px;
    
            padding: 14px;
    
            z-index: 50;
    
            opacity: 0;
            visibility: hidden;
    
            transition: 0.2s ease;
    
            pointer-events: none;
    
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
    
        .game-card:hover .game-tooltip {
            opacity: 1;
            visibility: visible;
        }
    
        .tooltip-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #66c0f4;
        }
    
        .tooltip-description {
            font-size: 13px;
        
            line-height: 1.4;
        
            color: #d7e5f0;
        
            margin-bottom: 12px;
        
            height: 95px;
        
            overflow: hidden;
        
            position: relative;
        }
        
        .tooltip-description-scroll {
            display: inline-block;
        
            animation: tooltipScroll 18s linear infinite;
        
            padding-bottom: 100px;
        }
        
        @keyframes tooltipScroll {
            0% {
                transform: translateY(0);
            }
        
            10% {
                transform: translateY(0);
            }
        
            90% {
                transform: translateY(calc(-100% + 95px));
            }
        
            100% {
                transform: translateY(0);
            }
        }
    
        .tooltip-meta {
            font-size: 13px;
            margin-bottom: 6px;
            color: #b8c7d5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header-title">Моя библиотека игр</h1>
        <p class="hint">Чтобы скопировать название игры слева от названия есть значек 📋</p>
        <p class="hint">Steam: 787 | GOG: 94 | Пройдено игр: 66</p>

        <div class="toolbar">
            <div class="topbar">
                <button class="filter-btn active" data-filter="steam">Steam</button>
                <button class="filter-btn" data-filter="gog">GOG</button>
                <button class="filter-btn" data-filter="completed">Пройдено игр</button>
            </div>
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию игры...">
        </div>

        <div class="subbar" id="completedSubbar">
            <button class="subfilter-btn active" data-subfilter="all">Все</button>
            <button class="subfilter-btn" data-subfilter="stream">На стриме (9)</button>
            <button class="subfilter-btn" data-subfilter="offstream">Вне стрима (57)</button>
        </div>

        <div class="games-grid" id="gamesGrid">
            
        </div>
    </div>

    <script>
        const buttons = document.querySelectorAll('.filter-btn');
        const subButtons = document.querySelectorAll('.subfilter-btn');
        let cards = [];
        const completedSubbar = document.getElementById('completedSubbar');
        const searchInput = document.getElementById('searchInput');

        let currentMainFilter = 'steam';
        let currentSubFilter = 'all';
        let currentSearch = '';
        
        async function loadGames() {
        
            const response = await fetch('json/all_games.json');
        
            const games = await response.json();
        
            const gamesGrid = document.getElementById('gamesGrid');
        
            gamesGrid.innerHTML = games.map(createGameCard).join('');
        
            cards = document.querySelectorAll('.game-card');
        
            updateCards();
        }
        
        function createGameCard(game) {
        
            let badges = '';
        
            if (game.completed_type === 'stream')
                badges += '<div class="game-badge badge-stream">На стриме</div>';
        
            if (game.completed_type === 'offstream')
                badges += '<div class="game-badge badge-offstream">Вне стрима</div>';
        
            if (game.platform === 'steam' || game.source_platform === 'steam')
                badges += '<div class="game-badge badge-platform badge-platform-steam">Steam</div>';
        
            if (game.platform === 'gog' || game.source_platform === 'gog')
                badges += '<div class="game-badge badge-platform badge-platform-gog">GOG</div>';
        
            let imageBlock = '';
        
            if (game.image) {
        
                imageBlock = `
                    <img
                        class="game-cover"
                        src="${game.image}"
                        alt="${game.name}"
                        loading="lazy">
                `;
        
            } else {
        
                imageBlock = `
                    <img
                        class="game-cover"
                        src="https://placehold.co/300x450/1b2838/ffffff?text=${encodeURIComponent(game.name)}"
                        alt="${game.name}"
                        loading="lazy">
                `;
            }
        
            const completedAttr =
                game.platform === 'completed'
                ? `data-completed-type="${game.completed_type || ''}"`
                : '';
        
            return `
                <a class="game-card"
                   href="${game.url || '#'}"
                   target="_blank"
                   rel="noopener noreferrer"
                   data-platform="${game.platform}"
                   data-name="${game.name_norm}"
                   ${completedAttr}>
        
                    <div class="game-cover-wrap">
                        ${badges}
                        ${imageBlock}
                    </div>
        
                    <div class="game-title">
        
                        <button
                            class="copy-btn"
                            onclick="copyGameName(event,'${game.name}')">
                            📋
                        </button>
        
                        <span class="game-title-text">
                            ${game.name}
                        </span>
        
                    </div>
        
                    <div class="game-tooltip">
        
                        <div class="tooltip-title">
                            ${game.name}
                        </div>
        
                        <div class="tooltip-description">
                            <div class="tooltip-description-scroll">
                                ${game.description || ''}
                            </div>
                        </div>
        
                        <div class="tooltip-meta">
                            <b>Жанры:</b> ${game.genres || ''}
                        </div>
        
                        <div class="tooltip-meta">
                            <b>Разработчик:</b> ${game.developers || ''}
                        </div>
        
                        <div class="tooltip-meta">
                            <b>Наиграно:</b> ${game.playtime || 0} ч.
                        </div>
        
                        <div class="tooltip-meta">
                            <b>Ачивки:</b> ${game.achievements_text || '0/0'}
                        </div>
        
                        <div class="tooltip-meta">
                            <b>Последний запуск:</b> ${game.last_played || ''}
                        </div>
        
                    </div>
        
                </a>
            `;
        }

        function updateButtons() {
            buttons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === currentMainFilter);
            });

            subButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.subfilter === currentSubFilter);
            });

            completedSubbar.classList.toggle('visible', currentMainFilter === 'completed');
        }

        function updateCards() {
            cards.forEach(card => {
                const platform = card.dataset.platform;
                const completedType = card.dataset.completedType || '';
                const gameName = card.dataset.name || '';

                let show = false;

                if (currentMainFilter === 'steam') {
                    show = platform === 'steam';
                } else if (currentMainFilter === 'gog') {
                    show = platform === 'gog';
                } else if (currentMainFilter === 'completed') {
                    if (platform === 'completed') {
                        if (currentSubFilter === 'all') {
                            show = true;
                        } else {
                            show = completedType === currentSubFilter;
                        }
                    }
                }

                if (show && currentSearch) {
                    show = gameName.includes(currentSearch);
                }

                card.classList.toggle('hidden', !show);
            });
        }

        function applyMainFilter(filterName) {
            currentMainFilter = filterName;
            if (filterName !== 'completed') {
                currentSubFilter = 'all';
            }
            updateButtons();
            updateCards();
        }

        function applySubFilter(subFilterName) {
            currentSubFilter = subFilterName;
            updateButtons();
            updateCards();
        }

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                applyMainFilter(btn.dataset.filter);
            });
        });

        subButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                applySubFilter(btn.dataset.subfilter);
            });
        });

        searchInput.addEventListener('input', () => {
            currentSearch = searchInput.value.trim().toLowerCase();
            updateCards();
        });

        loadGames().then(() => {
            applyMainFilter('steam');
        });
                
        function copyGameName(event, gameName) {
        
            event.preventDefault();
            event.stopPropagation();
        
            navigator.clipboard.writeText(gameName);
        
            const btn = event.currentTarget;
        
            const oldText = btn.innerHTML;
        
            btn.innerHTML = '✓';
        
            setTimeout(() => {
                btn.innerHTML = oldText;
            }, 1000);
        }
    </script>
</body>
</html>
